<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#0f2a52" />
  <meta name="description" content="Artes profissionais para sua divulgação no WhatsApp, Instagram e redes sociais. Peça a sua em minutos." />
  <title>Promova Profissional — Design para sua divulgação</title>
  <style>
    #adminGate{display:none;position:fixed;inset:0;z-index:99999;place-items:center;background:radial-gradient(circle at top,#0f2a52 0,#07111f 45%,#050914 100%);font-family:Arial,sans-serif;color:#fff;padding:20px}
    #adminGate.show{display:grid}.admin-login-card{width:min(420px,100%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:24px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.4)}
    .admin-login-card h1{margin:0 0 8px;font-size:30px}.admin-login-card p{color:#cbd5e1;margin:0 0 20px}.admin-login-card input{width:100%;box-sizing:border-box;padding:15px;border:0;border-radius:14px;font-size:16px;margin-bottom:12px}.admin-login-card button{width:100%;padding:15px;border:0;border-radius:14px;background:#ffd166;color:#111;font-size:16px;font-weight:900;cursor:pointer}#adminLoginError{display:none;background:#fecaca;color:#7f1d1d;padding:10px;border-radius:10px;margin-bottom:12px}body.admin-locked #root{visibility:hidden}
    .chatgptDownload{width:100%;border:0;border-radius:12px;padding:10px;background:#0ea5e9;color:#fff;font-weight:800;cursor:pointer}.chatgptDownload:disabled{opacity:.65;cursor:wait}.chatgptHint{font-size:12px;color:#cbd5e1;margin:4px 0 8px;line-height:1.35}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="adminGate"><form class="admin-login-card" id="adminLoginForm"><h1>🔒 Painel Profissional</h1><p>Digite a senha para acessar produção, pedidos e pagamentos.</p><input type="text" name="username" autocomplete="username" value="administrador" hidden /><input id="adminPassword" type="password" placeholder="Senha" autocomplete="current-password" required autofocus /><div id="adminLoginError">Senha incorreta.</div><button type="submit">ENTRAR</button></form></div>
  <script>
    (function(){
      const params=new URLSearchParams(window.location.search),view=(params.get('view')||'').toLowerCase();
      if(view==='admin')history.replaceState({},'','/admin');
      else if(view==='pedido')history.replaceState({},'','/pedido'+(params.get('tipo')?'?tipo='+encodeURIComponent(params.get('tipo')):''));
      else if(view==='acompanhar')history.replaceState({},'','/acompanhar'+(params.get('id')?'?id='+encodeURIComponent(params.get('id')):''));
      const originalPath=window.location.pathname.replace(/\/+$/,'')||'/',path=originalPath.toLowerCase();
      if(originalPath!==path&&['/admin','/pedido','/acompanhar'].includes(path))history.replaceState({},'',path+window.location.search+window.location.hash);
      const isAdmin=path==='/admin',authorized=sessionStorage.getItem('arteia_admin_ok')==='1',gate=document.getElementById('adminGate');
      if(isAdmin&&!authorized){document.body.classList.add('admin-locked');gate.classList.add('show')}
      async function sha256(text){const data=new TextEncoder().encode(text),hash=await crypto.subtle.digest('SHA-256',data);return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('')}
      document.getElementById('adminLoginForm').addEventListener('submit',async function(event){event.preventDefault();const digest=await sha256(document.getElementById('adminPassword').value),expected='72f5a9c15575d586f52b66d98a61a09dbb10c731fb504e38b47e6426e754f8f2';if(digest===expected){sessionStorage.setItem('arteia_admin_ok','1');window.location.replace('/admin')}else document.getElementById('adminLoginError').style.display='block'});

      const originalWrite=navigator.clipboard?.writeText?.bind(navigator.clipboard);
      if(originalWrite){navigator.clipboard.writeText=async function(text){let value=String(text||'');if(value.includes('Arte:')&&value.includes('Foto:')){value=value.replace(/Foto:\s*https?:\/\/\S+/i,'Foto: COLAR A FOTO COPIADA DO PEDIDO NESTA CONVERSA');value=value.replace(/Logo:\s*https?:\/\/\S+/i,'Logo: COLAR A LOGOMARCA COPIADA DO PEDIDO NESTA CONVERSA');value+='\n\nIMPORTANTE: primeiro copie a imagem pelo botão do painel e cole diretamente na conversa do ChatGPT. Depois cole este prompt.'}return originalWrite(value)}}

      async function copiarImagem(url){if(!navigator.clipboard||!window.ClipboardItem)throw new Error('Este navegador não permite copiar imagens diretamente. Use Chrome ou Edge atualizado.');const resposta=await fetch(url,{mode:'cors',cache:'no-store'});if(!resposta.ok)throw new Error('Não foi possível carregar a imagem.');const blobOriginal=await resposta.blob();const bitmap=await createImageBitmap(blobOriginal);const canvas=document.createElement('canvas');canvas.width=bitmap.width;canvas.height=bitmap.height;const ctx=canvas.getContext('2d');ctx.drawImage(bitmap,0,0);bitmap.close?.();const pngBlob=await new Promise((resolve,reject)=>canvas.toBlob(b=>b?resolve(b):reject(new Error('Não foi possível preparar a imagem.')),'image/png'));await navigator.clipboard.write([new ClipboardItem({'image/png':pngBlob})])}

      document.addEventListener('click',async function(event){const button=event.target.closest('button');if(!button)return;if(button.textContent.includes('Limpar cancelados')){event.preventDefault();event.stopImmediatePropagation();if(!confirm('Excluir definitivamente todos os pedidos cancelados?'))return;const password=prompt('Digite novamente a senha administrativa para confirmar:');if(!password)return;button.disabled=true;const antigo=button.textContent;button.textContent='Limpando...';try{const resposta=await fetch('/api/delete-cancelled',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});const data=await resposta.json();if(!resposta.ok)throw new Error(data.error||'Não foi possível limpar os cancelados.');alert(data.deleted?`${data.deleted} pedido(s) cancelado(s) excluído(s).`:'Não havia pedidos cancelados.');window.location.reload()}catch(error){alert(error.message);button.disabled=false;button.textContent=antigo}}},true);

      function melhorarCards(){document.querySelectorAll('.pedidoCardPlus').forEach(card=>{if(card.dataset.chatgptReady==='1')return;card.dataset.chatgptReady='1';const actions=card.querySelector('.acoes'),foto=card.querySelector('.pedidoFotoBox img');if(actions&&foto){const dica=document.createElement('p');dica.className='chatgptHint';dica.textContent='Clique para copiar a foto. Depois, no ChatGPT, use Ctrl+V para colar a imagem na conversa.';const botao=document.createElement('button');botao.type='button';botao.className='chatgptDownload';botao.textContent='📋 Copiar foto para o ChatGPT';botao.addEventListener('click',async()=>{const antigo=botao.textContent;botao.disabled=true;botao.textContent='Copiando foto...';try{await copiarImagem(foto.src);botao.textContent='✅ Foto copiada!';setTimeout(()=>{botao.textContent=antigo;botao.disabled=false},1800)}catch(error){alert(error.message);botao.textContent=antigo;botao.disabled=false}});actions.prepend(dica);actions.prepend(botao)}})}
      new MutationObserver(melhorarCards).observe(document.getElementById('root'),{childList:true,subtree:true});window.addEventListener('load',melhorarCards);
    })();
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
